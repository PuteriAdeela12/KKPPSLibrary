<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Automation - Dual Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .status-badge { @apply px-2 py-1 rounded-full text-[10px] font-bold uppercase; }
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in { animation: slide-in 0.3s ease-out forwards; }
        .scanner-box { @apply relative overflow-hidden rounded-xl bg-slate-900 border-2 border-slate-200 aspect-video mb-2; }
        .scanner-active { @apply border-blue-500 ring-2 ring-blue-100; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-md mx-auto p-4 sm:p-6 pb-20">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Library Hub</h1>
            <p class="text-slate-500 text-sm">Automated Borrow & Return System</p>
        </header>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 mb-6">
            <!-- Mode Toggle -->
            <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
                <button id="tab-borrow" onclick="setMode('BORROW')" class="flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-blue-600 transition-all">Borrow</button>
                <button id="tab-return" onclick="setMode('RETURN')" class="flex-1 py-2 rounded-lg text-sm font-semibold text-slate-600 transition-all">Return</button>
            </div>

            <div class="space-y-6">
                <!-- Student Section -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">1. Student Identity</label>
                        <button onclick="toggleScanner('student')" id="btn-scan-student" class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold uppercase">Toggle Camera</button>
                    </div>
                    <div id="reader-student" class="scanner-box"></div>
                    <input type="text" id="studentId" placeholder="Waiting for scan..." 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all text-sm font-medium">
                </div>

                <!-- Book Section -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">2. Book Barcode</label>
                        <button onclick="toggleScanner('book')" id="btn-scan-book" class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold uppercase">Toggle Camera</button>
                    </div>
                    <div id="reader-book" class="scanner-box"></div>
                    <input type="text" id="bookId" placeholder="Waiting for scan..." 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all text-sm font-medium">
                </div>

                <button id="submitBtn" onclick="submitTransaction()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    <span>Confirm Borrowing</span>
                </button>
            </div>
        </div>

        <!-- Feedback UI -->
        <div id="feedback" class="hidden p-4 rounded-2xl text-center mb-4 transition-all">
            <p id="feedbackText" class="font-bold text-sm"></p>
        </div>

        <!-- History -->
        <div>
            <div class="flex items-center justify-between mb-4 px-1">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Recent Activity</h2>
                <button onclick="clearHistory()" class="text-[10px] text-slate-400 hover:text-red-500 font-bold uppercase">Clear</button>
            </div>
            <div id="history" class="space-y-3">
                <div class="text-center py-8 border-2 border-dashed border-slate-200 rounded-2xl">
                    <p class="text-slate-400 text-xs">No recent transactions</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = ""; 
        let studentScanner;
        let bookScanner;
        let currentMode = 'BORROW';

        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 120 },
            aspectRatio: 1.777778
        };

        async function initScanners() {
            studentScanner = new Html5Qrcode("reader-student");
            bookScanner = new Html5Qrcode("reader-book");
            
            // Auto-start student scanner on load
            startScanner('student');
        }

        async function startScanner(type) {
            const scanner = type === 'student' ? studentScanner : bookScanner;
            const element = document.getElementById(`reader-${type}`);
            
            try {
                await scanner.start(
                    { facingMode: "environment" }, 
                    config, 
                    (text) => onScanSuccess(text, type)
                );
                element.classList.add('scanner-active');
            } catch (err) {
                console.warn(`${type} scanner error:`, err);
            }
        }

        async function toggleScanner(type) {
            const scanner = type === 'student' ? studentScanner : bookScanner;
            const element = document.getElementById(`reader-${type}`);

            if (scanner.isScanning) {
                await scanner.stop();
                element.classList.remove('scanner-active');
            } else {
                startScanner(type);
            }
        }

        function onScanSuccess(decodedText, type) {
            const input = document.getElementById(`${type}Id`);
            input.value = decodedText;
            
            // Visual feedback
            const container = document.getElementById(`reader-${type}`);
            container.style.borderColor = "#10b981";
            setTimeout(() => container.style.borderColor = "", 1000);

            if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);
            
            showFeedback(`${type === 'student' ? 'Student' : 'Book'} ID detected`, "success");

            // Focus logical flow
            if (type === 'student') {
                document.getElementById('bookId').focus();
                // If book scanner isn't running, start it
                if (!bookScanner.isScanning) startScanner('book');
            }
        }

        function setMode(mode) {
            currentMode = mode;
            const bTab = document.getElementById('tab-borrow');
            const rTab = document.getElementById('tab-return');
            const submitBtn = document.getElementById('submitBtn');

            if (mode === 'BORROW') {
                bTab.className = "flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-blue-600";
                rTab.className = "flex-1 py-2 rounded-lg text-sm font-semibold text-slate-500";
                submitBtn.innerHTML = "Confirm Borrowing";
                submitBtn.className = submitBtn.className.replace(/bg-\w+-600/g, 'bg-blue-600');
            } else {
                rTab.className = "flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-emerald-600";
                bTab.className = "flex-1 py-2 rounded-lg text-sm font-semibold text-slate-500";
                submitBtn.innerHTML = "Confirm Return";
                submitBtn.className = submitBtn.className.replace(/bg-\w+-600/g, 'bg-emerald-600');
            }
        }

        async function submitTransaction() {
            const studentId = document.getElementById('studentId').value;
            const bookId = document.getElementById('bookId').value;
            const submitBtn = document.getElementById('submitBtn');

            if (!studentId || !bookId) {
                showFeedback("Both IDs are required", "error");
                return;
            }

            const data = { studentId, bookId, action: currentMode, timestamp: new Date().toISOString() };
            submitBtn.disabled = true;
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = "Syncing...";

            try {
                // Mock delay
                await new Promise(r => setTimeout(r, 800));
                
                if (SCRIPT_URL) {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }
                
                handleSuccess(data);
            } catch (error) {
                showFeedback("Connection error", "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }

        function handleSuccess(data) {
            showFeedback(`Successfully processed ${currentMode.toLowerCase()}!`, "success");
            addToHistory(data);
            
            // Clear book ID for next item, but keep student ID for bulk sessions
            document.getElementById('bookId').value = "";
            document.getElementById('bookId').focus();
        }

        function showFeedback(msg, type) {
            const div = document.getElementById('feedback');
            const text = document.getElementById('feedbackText');
            div.className = `p-4 rounded-2xl text-center mb-4 transition-all scale-100 ${type === 'error' ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600'}`;
            text.innerText = msg;
            div.classList.remove('hidden');
            setTimeout(() => div.classList.add('hidden'), 3000);
        }

        function addToHistory(data) {
            const history = document.getElementById('history');
            if (history.querySelector('p.text-slate-400')) history.innerHTML = '';

            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.className = "bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center text-sm shadow-sm animate-slide-in";
            div.innerHTML = `
                <div>
                    <span class="font-bold text-slate-800">${data.bookId}</span>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-0.5">Student: ${data.studentId}</p>
                </div>
                <div class="text-right">
                    <span class="status-badge ${data.action === 'BORROW' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'}">${data.action}</span>
                    <p class="text-[9px] text-slate-300 font-medium mt-1">${time}</p>
                </div>`;
            history.prepend(div);
            if (history.children.length > 5) history.lastChild.remove();
        }

        function clearHistory() {
            document.getElementById('history').innerHTML = `
                <div class="text-center py-8 border-2 border-dashed border-slate-200 rounded-2xl">
                    <p class="text-slate-400 text-xs">No recent transactions</p>
                </div>`;
        }

        window.addEventListener('load', initScanners);
    </script>
</body>
</html>
