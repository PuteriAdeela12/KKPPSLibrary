<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKPPS Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .status-badge { @apply px-2 py-1 rounded-full text-[10px] font-bold uppercase; }
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in { animation: slide-in 0.3s ease-out forwards; }
        .scanner-box { @apply relative overflow-hidden rounded-xl bg-slate-900 border-2 border-slate-200 aspect-video mb-2 flex items-center justify-center transition-all duration-300; }
        .scanner-active { @apply border-blue-500 ring-2 ring-blue-100; }
        video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 1.5rem;
            align-items: center;
            justify-content: center;
        }

        .hidden-frame {
            height: 0 !important;
            margin-bottom: 0 !important;
            border: none !important;
            opacity: 0;
            pointer-events: none;
        }

        /* Pulse effect for hardware scanner ready state */
        .hardware-ready {
            @apply border-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.3)];
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-md mx-auto p-4 sm:p-6 pb-20">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">KKPPS Library</h1>
                <p class="text-slate-500 text-sm">Library Management System</p>
            </div>
            <button onclick="openAdminGate()" class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-200 shadow-sm hover:bg-slate-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.105-1.12 2-2.5 2S7 12.105 7 11s1.12-2 2.5-2 2.5.895 2.5 2zM12 11c0 1.105 1.12 2 2.5 2s2.5-.895 2.5-2-1.12-2-2.5-2-2.5.895-2.5 2z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 19v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                </svg>
                <span class="text-xs font-bold text-slate-600 uppercase">Admin</span>
            </button>
        </header>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 mb-6">
            <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
                <button id="tab-borrow" onclick="setMode('BORROW')" class="flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-blue-600 transition-all">Borrow</button>
                <button id="tab-return" onclick="setMode('RETURN')" class="flex-1 py-2 rounded-lg text-sm font-semibold text-slate-600 transition-all">Return</button>
            </div>

            <div class="space-y-6">
                <!-- Name Scan -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">1. Student ID (Name Scan)</label>
                        <button id="btn-rescan-name" onclick="initStudentFeed()" class="hidden text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded-md font-bold uppercase">Re-scan</button>
                    </div>
                    <div id="reader-student" class="scanner-box">
                        <video id="student-video" autoplay playsinline></video>
                        <canvas id="snap-canvas" class="hidden"></canvas>
                        <div id="capture-overlay" class="hidden absolute inset-0 bg-blue-600/20 flex items-center justify-center">
                            <div class="bg-white px-4 py-2 rounded-full text-blue-600 font-bold text-xs shadow-xl">Capturing...</div>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <div class="relative">
                            <input type="text" id="studentName" placeholder="Waiting for capture.." 
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-mono font-bold text-slate-800 focus:ring-2 focus:ring-purple-500 focus:outline-none transition-all">
                            <div id="name-loader" class="hidden absolute right-3 top-3">
                                <div class="animate-spin h-4 w-4 border-2 border-purple-500 border-t-transparent rounded-full"></div>
                            </div>
                        </div>
                        <button id="btn-snap-student" onclick="scanNameWithAI()" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 rounded-xl shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <span>Capture Name</span>
                        </button>
                    </div>
                </div>

                <!-- Book Barcode (DS2278 Optimized) -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">2. Scan Book Barcode</label>
                        <div class="flex gap-2">
                            <button onclick="useHardwareScanner()" id="btn-hw-scan" class="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md font-bold uppercase border border-emerald-200">DS2278 Active</button>
                            <button onclick="toggleBookScanner()" id="btn-scan-book" class="text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded-md font-bold uppercase">Cam Toggle</button>
                        </div>
                    </div>
                    
                    <div id="reader-book-container" class="relative">
                         <div id="reader-book" class="scanner-box hidden-frame"></div>
                         <div id="hw-status-box" class="scanner-box hardware-ready">
                            <div class="text-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-emerald-500 mx-auto mb-2 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                                </svg>
                                <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">DS2278 Ready</p>
                                <p class="text-[8px] text-slate-500">Scan any barcode now</p>
                            </div>
                         </div>
                    </div>

                    <div class="space-y-2">
                        <input type="text" id="bookId" oninput="lookupBookTitle()" placeholder="Waiting for DS2278.." 
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-mono font-bold text-slate-800 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                        <input type="text" id="bookTitleDisplay" placeholder="Book Title (Auto-fill)" readonly
                            class="w-full px-4 py-2 bg-slate-100 border border-slate-200 rounded-xl text-xs text-slate-500 italic outline-none">
                    </div>
                </div>

                <button id="submitBtn" onclick="submitTransaction()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-[0.98] transition-all">
                    Confirm & Sync to Cloud
                </button>
            </div>
        </div>

        <div>
            <div class="flex items-center justify-between mb-4 px-1">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest font-mono">Recent Activity</h2>
                <button onclick="clearHistory()" class="text-[10px] text-slate-400 hover:text-red-500 font-bold uppercase">Clear</button>
            </div>
            <div id="history" class="space-y-3"></div>
        </div>
    </div>

    <!-- Admin Authorization Panel -->
    <div id="authPanel" class="modal-overlay">
        <div class="bg-white w-full max-sm rounded-3xl p-6 shadow-2xl animate-slide-in">
            <h3 class="text-xl font-bold text-slate-900 mb-2">Admin Access</h3>
            <p class="text-sm text-slate-500 mb-6">Please authorize to manage settings.</p>
            <div class="space-y-4">
                <input type="email" id="adminEmail" placeholder="Email" class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl text-sm outline-none">
                <input type="password" id="adminPass" placeholder="Password" class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl text-sm outline-none">
                <div class="flex gap-2 pt-2">
                    <button onclick="closeAuth()" class="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl text-sm">Cancel</button>
                    <button onclick="handleAuthSubmit()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl text-sm shadow-lg">Login</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="modal-overlay">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-slide-in overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-900">Admin Dashboard</h3>
                <button onclick="toggleAdminPanel()" class="text-slate-400">✕</button>
            </div>

            <div class="flex border-b border-slate-100 mb-6">
                <button onclick="setAdminTab('cloud')" id="tab-admin-cloud" class="flex-1 pb-2 text-xs font-bold uppercase border-b-2 border-blue-600 text-blue-600">Cloud</button>
                <button onclick="setAdminTab('books')" id="tab-admin-books" class="flex-1 pb-2 text-xs font-bold uppercase border-b-2 border-transparent text-slate-400">Book Registry</button>
            </div>

            <div id="admin-cloud-content" class="space-y-4">
                <input type="text" id="scriptUrlInput" placeholder="App Script URL" class="w-full px-4 py-2 bg-slate-100 border-none rounded-xl text-[10px]">
                <input type="text" id="sheetUrlInput" placeholder="Sheet View Link" class="w-full px-4 py-2 bg-slate-100 border-none rounded-xl text-[10px]">
                <button onclick="saveAdminSettings()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl text-sm">Save URLs</button>
                <button onclick="openSheet()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-sm">View Google Sheet</button>
            </div>

            <div id="admin-books-content" class="hidden space-y-4">
                <div class="p-3 bg-slate-50 rounded-xl border border-slate-200">
                    <div id="reader-admin-reg" class="scanner-box h-32 mb-3 bg-slate-800 border-slate-300"></div>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="regBarcode" placeholder="Barcode ID" class="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm font-mono">
                        <button onclick="toggleAdminScanner()" id="btn-admin-scanner" class="bg-blue-600 text-white px-3 py-2 rounded-lg text-[10px] font-bold">Start Scan</button>
                    </div>
                    <input type="text" id="regTitle" placeholder="Book Title" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm mb-3">
                    <button onclick="registerBook()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-sm">Register Book</button>
                </div>
                <div id="regList" class="space-y-1"></div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let bookScanner;
        let adminBookScanner;
        let currentMode = 'BORROW';
        let studentStream;
        let isAdminAuthorized = false;
        
        // Variables for hardware DS2278 scanner
        let barcodeBuffer = "";
        let lastKeyTime = 0;

        const ADMIN_CREDS = { email: "admin@library.com", pass: "admin123" };

        let scriptUrl = localStorage.getItem('library_script_url') || "";
        let sheetViewUrl = localStorage.getItem('library_sheet_url') || "";
        let bookDatabase = JSON.parse(localStorage.getItem('library_book_db')) || {};

        // --- Hardware Scanner Logic (DS2278) ---
        window.addEventListener('keydown', (e) => {
            const currentTime = new Date().getTime();
            
            // DS2278 usually sends keys very fast (< 30ms)
            if (currentTime - lastKeyTime > 100) {
                barcodeBuffer = "";
            }

            if (e.key === 'Enter') {
                if (barcodeBuffer.length > 2) {
                    processHardwareScan(barcodeBuffer);
                    barcodeBuffer = "";
                }
            } else if (e.key.length === 1) {
                barcodeBuffer += e.key;
            }
            
            lastKeyTime = currentTime;
        });

        function processHardwareScan(code) {
            // If admin panel is open and focused on registry, fill that
            if (document.getElementById('adminPanel').style.display === 'flex') {
                document.getElementById('regBarcode').value = code;
            } else {
                // Otherwise fill the main book ID
                document.getElementById('bookId').value = code;
                lookupBookTitle();
                
                // Visual feedback
                const box = document.getElementById('hw-status-box');
                box.classList.add('bg-emerald-100');
                setTimeout(() => box.classList.remove('bg-emerald-100'), 300);
            }
        }

        function useHardwareScanner() {
            if (bookScanner && bookScanner.isScanning) {
                bookScanner.stop();
            }
            document.getElementById('reader-book').classList.add('hidden-frame');
            document.getElementById('hw-status-box').classList.remove('hidden-frame');
            document.getElementById('btn-hw-scan').className = "text-[10px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md font-bold uppercase border border-emerald-200";
            document.getElementById('btn-scan-book').className = "text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded-md font-bold uppercase";
            document.getElementById('bookId').placeholder = "Waiting for DS2278..";
        }

        async function initStudentFeed() {
            try {
                const frame = document.getElementById('reader-student');
                frame.classList.remove('hidden-frame');
                frame.classList.add('scanner-active');
                document.getElementById('btn-snap-student').classList.remove('hidden');
                document.getElementById('btn-rescan-name').classList.add('hidden');

                studentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('student-video').srcObject = studentStream;
            } catch (err) { console.error(err); }
        }

        async function closeStudentFeed() {
            if (studentStream) {
                studentStream.getTracks().forEach(track => track.stop());
                studentStream = null;
            }
            const frame = document.getElementById('reader-student');
            frame.classList.add('hidden-frame');
            frame.classList.remove('scanner-active');
            document.getElementById('btn-snap-student').classList.add('hidden');
            document.getElementById('btn-rescan-name').classList.remove('hidden');
        }

        async function scanNameWithAI() {
            const video = document.getElementById('student-video');
            const canvas = document.getElementById('snap-canvas');
            const overlay = document.getElementById('capture-overlay');
            
            overlay.classList.remove('hidden');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/png').split(',')[1];

            document.getElementById('studentName').value = "Extracting name...";
            document.getElementById('name-loader').classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Extract ONLY the student full name from this ID image. Plain text only. If no name found, respond 'Unknown'." },
                                { inlineData: { mimeType: "image/png", data: base64Image } }
                            ]
                        }]
                    })
                });
                const data = await response.json();
                const name = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "Unknown Student";
                document.getElementById('studentName').value = name;
                await closeStudentFeed();
            } catch (err) { 
                document.getElementById('studentName').value = "Capture Error"; 
            } finally {
                overlay.classList.add('hidden');
                document.getElementById('name-loader').classList.add('hidden');
            }
        }

        async function initBookScanner() {
            bookScanner = new Html5Qrcode("reader-book");
        }

        async function toggleBookScanner() {
            if (bookScanner.isScanning) { 
                await bookScanner.stop(); 
                useHardwareScanner();
            } else { 
                document.getElementById('reader-book').classList.remove('hidden-frame');
                document.getElementById('hw-status-box').classList.add('hidden-frame');
                document.getElementById('btn-hw-scan').className = "text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded-md font-bold uppercase";
                document.getElementById('btn-scan-book').className = "text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold uppercase border border-blue-200";
                document.getElementById('bookId').placeholder = "Waiting for camera scan..";
                
                try {
                    await bookScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 120 } }, (text) => {
                        document.getElementById('bookId').value = text;
                        lookupBookTitle();
                    });
                } catch(e) { alert("Camera occupied"); }
            }
        }

        async function toggleAdminScanner() {
            if (!adminBookScanner) adminBookScanner = new Html5Qrcode("reader-admin-reg");
            const btn = document.getElementById('btn-admin-scanner');
            if (adminBookScanner.isScanning) {
                await adminBookScanner.stop();
                btn.innerText = "Start Scan";
                document.getElementById('reader-admin-reg').classList.remove('scanner-active');
            } else {
                try {
                    if (bookScanner && bookScanner.isScanning) await bookScanner.stop();
                    await adminBookScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 200, height: 100 } }, (text) => {
                        document.getElementById('regBarcode').value = text;
                    });
                    btn.innerText = "Stop Scan";
                    document.getElementById('reader-admin-reg').classList.add('scanner-active');
                } catch (err) { alert("Camera busy."); }
            }
        }

        function lookupBookTitle() {
            const id = document.getElementById('bookId').value;
            const display = document.getElementById('bookTitleDisplay');
            if (bookDatabase[id]) {
                display.value = bookDatabase[id];
                display.className = "w-full px-4 py-2 bg-blue-50 border border-blue-200 rounded-xl text-xs text-blue-700 font-bold outline-none";
            } else {
                display.value = "Unknown Book (Unregistered)";
                display.className = "w-full px-4 py-2 bg-slate-100 border border-slate-200 rounded-xl text-xs text-slate-500 italic outline-none";
            }
        }

        function openAdminGate() {
            if (isAdminAuthorized) toggleAdminPanel();
            else document.getElementById('authPanel').style.display = 'flex';
        }

        function handleAuthSubmit() {
            if (document.getElementById('adminEmail').value === ADMIN_CREDS.email && document.getElementById('adminPass').value === ADMIN_CREDS.pass) {
                isAdminAuthorized = true;
                closeAuth();
                toggleAdminPanel();
            } else { alert("Wrong credentials."); }
        }

        function closeAuth() { document.getElementById('authPanel').style.display = 'none'; }

        async function toggleAdminPanel() {
            const p = document.getElementById('adminPanel');
            const isClosing = p.style.display === 'flex';
            if (isClosing) {
                p.style.display = 'none';
                if (adminBookScanner?.isScanning) await adminBookScanner.stop();
            } else {
                p.style.display = 'flex';
                document.getElementById('scriptUrlInput').value = scriptUrl;
                document.getElementById('sheetUrlInput').value = sheetViewUrl;
                renderRegList();
            }
        }

        function setAdminTab(tab) {
            const isCloud = tab === 'cloud';
            document.getElementById('admin-cloud-content').classList.toggle('hidden', !isCloud);
            document.getElementById('admin-books-content').classList.toggle('hidden', isCloud);
            document.getElementById('tab-admin-cloud').className = isCloud ? "flex-1 pb-2 text-xs font-bold uppercase border-b-2 border-blue-600 text-blue-600" : "flex-1 pb-2 text-xs font-bold uppercase border-b-2 border-transparent text-slate-400";
            document.getElementById('tab-admin-books').className = !isCloud ? "flex-1 pb-2 text-xs font-bold uppercase border-b-2 border-blue-600 text-blue-600" : "flex-1 pb-2 text-xs font-bold uppercase border-b-2 border-transparent text-slate-400";
        }

        function registerBook() {
            const id = document.getElementById('regBarcode').value;
            const title = document.getElementById('regTitle').value;
            if (!id || !title) return;
            bookDatabase[id] = title;
            localStorage.setItem('library_book_db', JSON.stringify(bookDatabase));
            document.getElementById('regBarcode').value = "";
            document.getElementById('regTitle').value = "";
            renderRegList();
        }

        function renderRegList() {
            const list = document.getElementById('regList');
            list.innerHTML = "";
            Object.keys(bookDatabase).reverse().forEach(id => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white p-3 border border-slate-100 rounded-xl text-[10px] shadow-sm mb-1";
                div.innerHTML = `<div><span class="font-bold block">${bookDatabase[id]}</span><span class="font-mono text-slate-400">${id}</span></div><button onclick="deleteBook('${id}')" class="text-red-400">Remove</button>`;
                list.appendChild(div);
            });
        }

        function deleteBook(id) {
            delete bookDatabase[id];
            localStorage.setItem('library_book_db', JSON.stringify(bookDatabase));
            renderRegList();
        }

        function saveAdminSettings() {
            scriptUrl = document.getElementById('scriptUrlInput').value;
            sheetViewUrl = document.getElementById('sheetUrlInput').value;
            localStorage.setItem('library_script_url', scriptUrl);
            localStorage.setItem('library_sheet_url', sheetViewUrl);
            alert("Saved");
        }

        function openSheet() { window.open(sheetViewUrl || "https://sheets.google.com", '_blank'); }

        async function submitTransaction() {
            const name = document.getElementById('studentName').value;
            const bookId = document.getElementById('bookId').value;
            const bookTitle = bookDatabase[bookId] || "Unknown Book";
            const btn = document.getElementById('submitBtn');
            
            if (!name || !bookId || name.includes("Extracting")) {
                return alert("Missing student name or book ID.");
            }
            if (!scriptUrl) {
                return alert("Setup App Script URL in Admin Dashboard first.");
            }

            btn.disabled = true;
            btn.innerText = "Syncing...";

            const params = new URLSearchParams();
            params.append('studentName', name);
            params.append('bookId', bookId);
            params.append('bookTitle', bookTitle);
            params.append('action', currentMode);

            try {
                await fetch(scriptUrl, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString() 
                });
                
                addToHistory({ bookId, bookTitle, studentName: name, action: currentMode });
                
                document.getElementById('bookId').value = "";
                lookupBookTitle();
                alert(`Successfully synced: ${bookTitle}`);
            } catch (err) { 
                console.error(err);
                alert("Network or Sync Error."); 
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirm & Sync to Cloud";
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-borrow').className = mode === 'BORROW' ? "flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-blue-600" : "flex-1 py-2 rounded-lg text-sm font-semibold text-slate-500";
            document.getElementById('tab-return').className = mode === 'RETURN' ? "flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-emerald-600" : "flex-1 py-2 rounded-lg text-sm font-semibold text-slate-500";
            document.getElementById('submitBtn').className = `w-full ${mode === 'BORROW' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-emerald-600 hover:bg-emerald-700'} text-white font-bold py-4 rounded-2xl shadow-lg active:scale-[0.98] transition-all`;
        }

        function addToHistory(data) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center text-sm shadow-sm animate-slide-in";
            div.innerHTML = `<div><span class="font-bold">${data.bookTitle}</span><p class="text-[10px] text-slate-400">${data.studentName}</p></div><span class="status-badge ${data.action === 'BORROW' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'}">${data.action}</span>`;
            h.prepend(div);
        }

        function clearHistory() { document.getElementById('history').innerHTML = ''; }
        window.onload = () => { initStudentFeed(); initBookScanner(); useHardwareScanner(); };
    </script>
</body>
</html>
