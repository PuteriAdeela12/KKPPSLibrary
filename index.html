<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KKPPS Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .status-badge { @apply px-2 py-1 rounded-full text-[10px] font-bold uppercase; }
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in { animation: slide-in 0.3s ease-out forwards; }
        .scanner-box { @apply relative overflow-hidden rounded-xl bg-slate-900 border-2 border-slate-200 aspect-video mb-2 flex items-center justify-center; }
        .scanner-active { @apply border-blue-500 ring-2 ring-blue-100; }
        video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 1.5rem;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-md mx-auto p-4 sm:p-6 pb-20">
        <header class="mb-6 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">KKPPS Library</h1>
                <p class="text-slate-500 text-sm">Library Management System</p>
            </div>
            <!-- Admin Button with Icon and Text -->
            <button onclick="openAdminGate()" class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-200 shadow-sm hover:bg-slate-50 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 1.105-1.12 2-2.5 2S7 12.105 7 11s1.12-2 2.5-2 2.5.895 2.5 2zM12 11c0 1.105 1.12 2 2.5 2s2.5-.895 2.5-2-1.12-2-2.5-2-2.5.895-2.5 2z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 19v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 19v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
                </svg>
                <span class="text-xs font-bold text-slate-600 uppercase">Admin</span>
            </button>
        </header>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-5 mb-6">
            <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
                <button id="tab-borrow" onclick="setMode('BORROW')" class="flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-blue-600 transition-all">Borrow</button>
                <button id="tab-return" onclick="setMode('RETURN')" class="flex-1 py-2 rounded-lg text-sm font-semibold text-slate-600 transition-all">Return</button>
            </div>

            <div class="space-y-6">
                <!-- Name Scan -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">1. Student ID (Name Scan)</label>
                    </div>
                    <div id="reader-student" class="scanner-box">
                        <video id="student-video" autoplay playsinline></video>
                        <canvas id="snap-canvas" class="hidden"></canvas>
                    </div>
                    <div class="space-y-3">
                        <div class="relative">
                            <input type="text" id="studentName" placeholder="Waiting for capture..." 
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:ring-2 focus:ring-purple-500 focus:outline-none transition-all">
                            <div id="name-loader" class="hidden absolute right-3 top-3">
                                <div class="animate-spin h-4 w-4 border-2 border-purple-500 border-t-transparent rounded-full"></div>
                            </div>
                        </div>
                        <!-- Capture Button moved under the input -->
                        <button id="btn-snap-student" onclick="scanNameWithAI()" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 rounded-xl shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <span>Capture Name</span>
                        </button>
                    </div>
                </div>

                <!-- Book Barcode -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">2. Scan Book Barcode</label>
                        <button onclick="toggleBookScanner()" id="btn-scan-book" class="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold uppercase">Toggle Camera</button>
                    </div>
                    <div id="reader-book" class="scanner-box"></div>
                    <div class="flex gap-2">
                        <input type="text" id="bookId" placeholder="Waiting for barcode..." 
                            class="flex-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-medium focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                    </div>
                </div>

                <button id="submitBtn" onclick="submitTransaction()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-[0.98] transition-all">
                    Confirm & Sync to Cloud
                </button>
            </div>
        </div>

        <div>
            <div class="flex items-center justify-between mb-4 px-1">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest font-mono">Recent Activity</h2>
                <button onclick="clearHistory()" class="text-[10px] text-slate-400 hover:text-red-500 font-bold uppercase">Clear</button>
            </div>
            <div id="history" class="space-y-3"></div>
        </div>
    </div>

    <!-- Authorization Gate -->
    <div id="authPanel" class="modal-overlay">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-slide-in">
            <h3 class="text-xl font-bold text-slate-900 mb-2">Admin Access</h3>
            <p class="text-sm text-slate-500 mb-6">Please authorize to manage cloud settings.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Email</label>
                    <input type="email" id="adminEmail" class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Password</label>
                    <input type="password" id="adminPass" class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="closeAuth()" class="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl text-sm">Cancel</button>
                    <button onclick="handleAuthSubmit()" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-xl text-sm shadow-lg">Login</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="modal-overlay">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl animate-slide-in overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-slate-900">Cloud Settings</h3>
                <button onclick="toggleAdminPanel()" class="text-slate-400">✕</button>
            </div>

            <div class="space-y-4">
                <div class="p-4 bg-amber-50 rounded-2xl border border-amber-100 text-[11px] text-amber-800 leading-relaxed">
                    <p class="font-bold mb-1">⚠️ Connected to Sheet:</p>
                    <p>Modify script URL to change destination.</p>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">App Script Web App URL</label>
                    <input type="text" id="scriptUrlInput" placeholder="https://script.google.com/..." 
                        class="w-full px-4 py-2 bg-slate-100 border-none rounded-xl text-[10px]">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1 ml-1">Direct Sheet View Link</label>
                    <input type="text" id="sheetUrlInput" placeholder="https://docs.google.com/..." 
                        class="w-full px-4 py-2 bg-slate-100 border-none rounded-xl text-[10px]">
                </div>

                <div class="pt-2 flex flex-col gap-2">
                    <button onclick="saveAdminSettings()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl text-sm">Save Changes</button>
                    <button onclick="openSheet()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-sm">Open Google Sheet</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let bookScanner;
        let currentMode = 'BORROW';
        let studentStream;
        let isAdminAuthorized = false;
        
        // Mock Admin Credentials (In a real app, this would be handled via Firebase Auth or backend)
        const ADMIN_CREDS = { email: "admin@library.com", pass: "admin123" };

        let scriptUrl = localStorage.getItem('library_script_url') || "";
        let sheetViewUrl = localStorage.getItem('library_sheet_url') || "";

        async function initStudentFeed() {
            try {
                studentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('student-video').srcObject = studentStream;
                document.getElementById('reader-student').classList.add('scanner-active');
            } catch (err) { console.error(err); }
        }

        async function scanNameWithAI() {
            const video = document.getElementById('student-video');
            const canvas = document.getElementById('snap-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/png').split(',')[1];

            document.getElementById('studentName').value = "Reading ID card...";
            document.getElementById('name-loader').classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Extract ONLY the student full name from this ID image. Plain text only." },
                                { inlineData: { mimeType: "image/png", data: base64Image } }
                            ]
                        }]
                    })
                });
                const data = await response.json();
                const name = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "Unknown Student";
                document.getElementById('studentName').value = name;
            } catch (err) { document.getElementById('studentName').value = "Read failed"; }
            document.getElementById('name-loader').classList.add('hidden');
        }

        async function initBookScanner() {
            bookScanner = new Html5Qrcode("reader-book");
            startBookScanner();
        }

        async function startBookScanner() {
            try {
                await bookScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 120 } }, (text) => {
                    document.getElementById('bookId').value = text;
                });
                document.getElementById('reader-book').classList.add('scanner-active');
            } catch (err) {}
        }

        async function toggleBookScanner() {
            if (bookScanner.isScanning) { await bookScanner.stop(); document.getElementById('reader-book').classList.remove('scanner-active'); }
            else { startBookScanner(); }
        }

        // Authorization Logic
        function openAdminGate() {
            if (isAdminAuthorized) {
                toggleAdminPanel();
            } else {
                document.getElementById('authPanel').style.display = 'flex';
            }
        }

        function closeAuth() {
            document.getElementById('authPanel').style.display = 'none';
        }

        function handleAuthSubmit() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;

            if (email === ADMIN_CREDS.email && pass === ADMIN_CREDS.pass) {
                isAdminAuthorized = true;
                closeAuth();
                toggleAdminPanel();
                // Clear fields for security
                document.getElementById('adminEmail').value = "";
                document.getElementById('adminPass').value = "";
            } else {
                alert("Invalid Administrator credentials.");
            }
        }

        function toggleAdminPanel() {
            const p = document.getElementById('adminPanel');
            p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
            document.getElementById('scriptUrlInput').value = scriptUrl;
            document.getElementById('sheetUrlInput').value = sheetViewUrl;
        }

        function saveAdminSettings() {
            scriptUrl = document.getElementById('scriptUrlInput').value;
            sheetViewUrl = document.getElementById('sheetUrlInput').value;
            localStorage.setItem('library_script_url', scriptUrl);
            localStorage.setItem('library_sheet_url', sheetViewUrl);
            toggleAdminPanel();
            alert("Settings synchronized.");
        }

        function openSheet() { window.open(sheetViewUrl || "https://sheets.google.com", '_blank'); }

        async function submitTransaction() {
            const name = document.getElementById('studentName').value;
            const book = document.getElementById('bookId').value;
            const btn = document.getElementById('submitBtn');

            if (!name || !book || name === "Waiting for capture..." || name === "Read failed") {
                return alert("Please ensure student name is captured and book barcode is scanned.");
            }
            if (!scriptUrl) return alert("Admin: Set up the Google App Script URL first.");

            btn.disabled = true;
            btn.innerText = "Syncing...";

            const params = new URLSearchParams();
            params.append('studentName', name);
            params.append('bookId', book);
            params.append('action', currentMode);
            params.append('timestamp', new Date().toLocaleString());

            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params.toString()
                });

                addToHistory({ bookId: book, studentName: name, action: currentMode, time: new Date().toLocaleTimeString() });
                document.getElementById('bookId').value = "";
                // We keep name in field in case the same student is borrowing multiple books
                alert(`Logged: ${book} for ${name}`);
            } catch (err) {
                alert("Cloud Sync failed. Check script URL in Admin panel.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirm & Sync to Cloud";
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tab-borrow').className = mode === 'BORROW' ? "flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-blue-600" : "flex-1 py-2 rounded-lg text-sm font-semibold text-slate-500";
            document.getElementById('tab-return').className = mode === 'RETURN' ? "flex-1 py-2 rounded-lg text-sm font-semibold bg-white shadow-sm text-emerald-600" : "flex-1 py-2 rounded-lg text-sm font-semibold text-slate-500";
            document.getElementById('submitBtn').className = `w-full ${mode === 'BORROW' ? 'bg-blue-600' : 'bg-emerald-600'} text-white font-bold py-4 rounded-2xl shadow-lg`;
        }

        function addToHistory(data) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center text-sm shadow-sm animate-slide-in";
            div.innerHTML = `<div><span class="font-bold">${data.bookId}</span><p class="text-[10px] text-slate-400">Student: ${data.studentName} | ${data.time}</p></div><span class="status-badge ${data.action === 'BORROW' ? 'bg-blue-50 text-blue-600' : 'bg-emerald-50 text-emerald-600'}">${data.action}</span>`;
            h.prepend(div);
        }

        function clearHistory() { document.getElementById('history').innerHTML = ''; }

        window.onload = () => { initStudentFeed(); initBookScanner(); };
    </script>
</body>
</html>
